# Docker Compose for distributed rendering - without GPU for now
version: '3.8'

services:
  # Build the Blender render image first
  render-builder:
    build:
      context: docker
      dockerfile: Dockerfile
    image: blender-render:latest
    command: "true"  # Just build the image, don't run

  # Render node 1
  render-node-01:
    image: blender-render:latest
    container_name: blender-render-01
    ports:
      - "8080:8080"
    volumes:
      - ./bucket_resources:/workspace:rw
      - render-cache-01:/tmp
    environment:
      - NODE_ID=render-node-01
      - BLENDER_USER_SCRIPTS=/workspace/scripts
      - BLENDER_USER_DATAFILES=/workspace/datafiles
    restart: unless-stopped
    depends_on:
      - render-builder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - render-network

  # Render node 2
  render-node-02:
    image: blender-render:latest
    container_name: blender-render-02
    ports:
      - "8081:8080"
    volumes:
      - ./bucket_resources:/workspace:rw
      - render-cache-02:/tmp
    environment:
      - NODE_ID=render-node-02
      - BLENDER_USER_SCRIPTS=/workspace/scripts
      - BLENDER_USER_DATAFILES=/workspace/datafiles
    restart: unless-stopped
    depends_on:
      - render-builder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - render-network

  # Render node 3
  render-node-03:
    image: blender-render:latest
    container_name: blender-render-03
    ports:
      - "8082:8080"
    volumes:
      - ./bucket_resources:/workspace:rw
      - render-cache-03:/tmp
    environment:
      - NODE_ID=render-node-03
      - BLENDER_USER_SCRIPTS=/workspace/scripts
      - BLENDER_USER_DATAFILES=/workspace/datafiles
    restart: unless-stopped
    depends_on:
      - render-builder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - render-network

  # Render node 4
  render-node-04:
    image: blender-render:latest
    container_name: blender-render-04
    ports:
      - "8083:8080"
    volumes:
      - ./bucket_resources:/workspace:rw
      - render-cache-04:/tmp
    environment:
      - NODE_ID=render-node-04
      - BLENDER_USER_SCRIPTS=/workspace/scripts
      - BLENDER_USER_DATAFILES=/workspace/datafiles
    restart: unless-stopped
    depends_on:
      - render-builder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - render-network

  # Optional: Monitoring service
  portainer:
    image: portainer/portainer-ce:latest
    container_name: render-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped
    networks:
      - render-network

# Named volumes for persistent data
volumes:
  render-cache-01:
    driver: local
  render-cache-02:
    driver: local
  render-cache-03:
    driver: local
  render-cache-04:
    driver: local
  portainer-data:
    driver: local

# Custom network
networks:
  render-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16