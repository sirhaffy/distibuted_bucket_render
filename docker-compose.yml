# Docker Compose for distributed rendering - GPU enabled
services:
  # Render node 1
  render-node-01:
    build:
      context: docker
      dockerfile: Dockerfile
    image: blender-render:latest
    container_name: blender-render-01
    ports:
      - "8080:8080"
    environment:
      - NODE_ID=render-node-01
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - render-network

  # Render node 2
  render-node-02:
    build:
      context: docker
      dockerfile: Dockerfile
    image: blender-render:latest
    container_name: blender-render-02
    ports:
      - "8081:8080"
    environment:
      - NODE_ID=render-node-02
    restart: unless-stopped
