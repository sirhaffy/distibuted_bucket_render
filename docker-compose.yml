      start_period: 10s
    networks:
      - render-network

  # Render node 4
  render-node-04:
    build:
      context: docker
      dockerfile: Dockerfile
    image: blender-render:latest
    container_name: blender-render-04
    ports:
      - "8083:8080"
    environment:
      - NODE_ID=render-node-04
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - render-network

  # Optional: Monitoring service
  portainer:
    image: portainer/portainer-ce:latest
    container_name: render-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped
    networks:
      - render-network

# Named volumes
volumes:
  portainer-data:
    driver: local

# Custom network
networks:
  render-network:
    driver: bridge